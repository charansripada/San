<!DOCTYPE html>
<html>
<head>
<title>My PDF Library</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:400px;
margin:auto;
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.pdf{
margin:20px 0;
}

button{
padding:8px 15px;
margin:5px;
border:none;
border-radius:5px;
background:#007BFF;
color:white;
cursor:pointer;
}

button:hover{
background:#0056b3;
}
</style>
</head>

<body>

<h1>My PDF Collection</h1>

<div class="container">

<div class="pdf">
<h3>PDF 1</h3>
<a href="pdf1.pdf" target="_blank">
<button>View</button>
</a>

<a href="pdf1.pdf" download>
<button>Download</button>
</a>
</div>

<div class="pdf">
<h3>PDF 2</h3>
<a href="pdf2.pdf" target="_blank">
<button>View</button>
</a>

<a href="pdf2.pdf" download>
<button>Download</button>
</a>
</div>

</div>

</body>
</html>
